services:
  backend:
    image: side-ai-editor-backend:latest
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      PORT: "8080"
    env_file:
      - .env.docker
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:$${PORT:-8080}/health > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
